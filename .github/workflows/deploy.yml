name: Laravel CI/CD - AWS EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Deploy to EC2
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |

            echo "Starting deployment..."

            cd /var/www/product-management-api

            echo "Pulling latest code..."
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            echo "Installing Composer dependencies..."
            composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader

            echo "Setting up environment..."
            if [ ! -f .env ]; then
              cp .env.example .env
              php artisan key:generate
            fi

            echo "Running migrations..."
            php artisan migrate --force

            echo "Clearing caches..."
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            echo "Rebuilding caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Fixing permissions..."
            sudo chown -R ubuntu:www-data /var/www/product-management-api
            sudo chmod -R 775 storage bootstrap/cache
            sudo chmod -R 755 /var/www/product-management-api

            echo "Restarting services..."
            sudo systemctl restart php8.2-fpm
            sudo systemctl restart nginx

            echo "Deployment completed successfully."

  # Notify Result
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: |
          echo "Deployment to http://44.220.146.133 was SUCCESSFUL"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"

      - name: Deployment Failed
        if: needs.deploy.result == 'failure'
        run: |
          echo "Deployment FAILED"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          exit 1