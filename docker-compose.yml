services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: product-dashboard-backend-app
    container_name: product-dashboard-backend-app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SECREATE: ${SECREATE}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: products_dashboard
      DB_USERNAME: laravel_user
      DB_PASSWORD: StrongPassword123!
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: product-dashboard-backend-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: products_dashboard
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: StrongPassword123!
      MYSQL_ROOT_PASSWORD: StrongPassword123!
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
